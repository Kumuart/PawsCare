{% extends 'base.html' %}
{% block title %}Add Pet — PawsCare{% endblock %}
{% block content %}
<div style="max-width:560px;">
  <div class="page-header">
    <div class="page-title">➕ Add Pet for Adoption</div>
    <div class="page-subtitle">{{ center.name }}</div>
  </div>
  <div class="card">
    <form method="POST">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Pet Name</label>
          <input type="text" name="name" class="form-control" placeholder="Mochi" required>
        </div>
        <div class="form-group">
          <label class="form-label">Species</label>
          <select name="species" class="form-control" required>
            <option value="Cat">🐱 Cat</option>
            <option value="Dog">🐶 Dog</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Breed (Optional)</label>
          <input type="text" name="breed" class="form-control" placeholder="Scottish Fold">
        </div>
        <div class="form-group">
          <label class="form-label">Estimated Age</label>
          <input type="text" name="estimated_age" class="form-control" placeholder="1 year" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Gender</label>
          <select name="gender" class="form-control" required>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Health Status</label>
          <select name="health_status" class="form-control" required>
            <option value="Healthy">Healthy</option>
            <option value="Requires Medication">Requires Medication</option>
            <option value="Special Needs">Special Needs</option>
            <option value="Recovering">Recovering</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea name="description" class="form-control" rows="3" placeholder="Tell adopters about this cat..."></textarea>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Add Pet Listing →</button>
    </form>
  </div>
</div>
{% endblock %}
