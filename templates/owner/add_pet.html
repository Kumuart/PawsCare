{% extends 'base.html' %}
{% block title %}Add Pet — PawsCare{% endblock %}
{% block content %}
<div style="max-width:560px;">
  <div class="page-header">
    <div class="page-title">🐾 Add New Pet</div>
    <div class="page-subtitle">Create a profile for your pet</div>
  </div>
  <div class="card">
    <form method="POST">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Pet Name *</label>
          <input type="text" name="name" class="form-control" placeholder="Whiskers" required>
        </div>
        <div class="form-group">
          <label class="form-label">Species *</label>
          <select name="species" class="form-control" required>
            <option value="">Select...</option>
            <option value="Cat">🐱 Cat</option>
            <option value="Dog">🐶 Dog</option>
            <option value="Rabbit">🐰 Rabbit</option>
            <option value="Bird">🐦 Bird</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Breed (Optional)</label>
          <input type="text" name="breed" class="form-control" placeholder="Maine Coon">
        </div>
        <div class="form-group">
          <label class="form-label">Age *</label>
          <input type="text" name="age" class="form-control" placeholder="2 years" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Gender *</label>
          <select name="gender" class="form-control" required>
            <option value="">Select...</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Weight (Optional)</label>
          <input type="text" name="weight" class="form-control" placeholder="4.5 kg">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Known Conditions</label>
        <input type="text" name="known_conditions" class="form-control" placeholder="e.g. Diabetes, or None">
      </div>
      <div class="form-group">
        <label class="form-label">Known Allergies</label>
        <input type="text" name="allergies" class="form-control" placeholder="e.g. Certain proteins, or None">
      </div>
      <div style="display:flex;gap:10px;">
        <a href="/owner/pets" class="btn btn-outline" style="flex:1;text-align:center;justify-content:center;">Cancel</a>
        <button type="submit" class="btn btn-primary" style="flex:1;justify-content:center;">Create Pet</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
